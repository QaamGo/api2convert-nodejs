name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # OIDC lets npm attach a provenance attestation (auth is via NPM_TOKEN)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Assert package version matches the tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) != tag ($TAG_VERSION)" >&2
            exit 1
          fi
      - run: npm run check
      - run: npm run build
      # access:public and provenance:true come from package.json publishConfig.
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
